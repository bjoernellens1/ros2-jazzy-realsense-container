name: ros2-jazzy-realsense

x-common: &common
  image: localhost/ros2-jazzy-realsense:latest
  build:
    context: .
    dockerfile: Containerfile
    args:
      ROS_DISTRO: jazzy
  network_mode: host
  ipc: host
  pid: host
  privileged: true
  stdin_open: true
  tty: true
  environment:
    ROS_DISTRO: jazzy
    ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
    RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
    DISPLAY: ${DISPLAY:-:0}
    WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-}
    XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/tmp}
    QT_X11_NO_MITSHM: ${QT_X11_NO_MITSHM:-1}
    LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE:-0}
    CAMERA_NAME: ${CAMERA_NAME:-camera}
    DEPTH_PROFILE: ${DEPTH_PROFILE:-640x480x15}
    COLOR_PROFILE: ${COLOR_PROFILE:-640x480x15}
    ENABLE_POINTCLOUD: ${ENABLE_POINTCLOUD:-false}
    ALIGN_DEPTH: ${ALIGN_DEPTH:-true}
    INITIAL_RESET: ${INITIAL_RESET:-true}
    ENABLE_IMU: ${ENABLE_IMU:-true}
    UNITE_IMU_METHOD: ${UNITE_IMU_METHOD:-2}
    ROSBAG_STORAGE: ${ROSBAG_STORAGE:-mcap}
    RTABMAP_FRAME_ID: ${RTABMAP_FRAME_ID:-camera_link}
    RTABMAP_ODOM_FRAME_ID: ${RTABMAP_ODOM_FRAME_ID:-odom}
    RTABMAP_TOPIC_QUEUE_SIZE: ${RTABMAP_TOPIC_QUEUE_SIZE:-30}
    RTABMAP_SYNC_QUEUE_SIZE: ${RTABMAP_SYNC_QUEUE_SIZE:-30}
    RTABMAP_APPROX_SYNC_MAX_INTERVAL: ${RTABMAP_APPROX_SYNC_MAX_INTERVAL:-0.0}
    RTABMAP_RESET_COUNTDOWN: ${RTABMAP_RESET_COUNTDOWN:-0}
    RTABMAP_VIS_MIN_INLIERS: ${RTABMAP_VIS_MIN_INLIERS:-8}
    RTABMAP_VIS_MAX_FEATURES: ${RTABMAP_VIS_MAX_FEATURES:-1500}
    RTABMAP_ODOM_STRATEGY: ${RTABMAP_ODOM_STRATEGY:-0}
    RTABMAP_ODOM_F2M_MAX_SIZE: ${RTABMAP_ODOM_F2M_MAX_SIZE:-2000}
    RTABMAP_VIS_MAX_DEPTH: ${RTABMAP_VIS_MAX_DEPTH:-8.0}
    RTABMAP_VIS_MIN_DEPTH: ${RTABMAP_VIS_MIN_DEPTH:-0.3}
    RTABMAP_WAIT_TIMEOUT: ${RTABMAP_WAIT_TIMEOUT:-30}
  volumes:
    - /dev:/dev
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - ${XDG_RUNTIME_DIR:-/tmp}:${XDG_RUNTIME_DIR:-/tmp}:rw
    - ./bags:/work/bags:rw
    - ./logs:/work/logs:rw
    - ./config:/work/config:rw
    - ./docker:/work/docker:rw
    - ./rviz:/work/rviz:rw
    - ./scripts:/work/scripts:rw
    - ./tests:/work/tests:rw
    - ./odometry:/work/odometry:rw
  working_dir: /work

x-pseudo-gt: &pseudo-gt
  <<: *common
  image: localhost/ros2-jazzy-pseudo-gt:latest
  build:
    context: .
    dockerfile: Containerfile.orbslam3
    args:
      BASE_IMAGE: localhost/ros2-jazzy-realsense:latest
  shm_size: ${PSEUDO_GT_SHM_SIZE:-32gb}

x-pseudo-gt-cuda: &pseudo-gt-cuda
  <<: *common
  image: localhost/ros2-jazzy-pseudo-gt-cuda:latest
  build:
    context: .
    dockerfile: Containerfile.cuda
    args:
      ROS_DISTRO: jazzy
  shm_size: ${PSEUDO_GT_SHM_SIZE:-32gb}
  gpus: all

services:
  shell:
    <<: *common
    command: bash

  camera:
    <<: *common
    command: /work/scripts/_inside_camera_ros.sh

  viewer:
    <<: *common
    command: realsense-viewer

  rviz:
    <<: *common
    command: rviz2 -d /work/rviz/realsense_rgbd.rviz

  rviz-rtabmap:
    <<: *common
    command: rviz2 -d /work/rviz/realsense_rtabmap.rviz

  rtabmap-odom:
    <<: *common
    profiles: ["slam"]
    command: /work/scripts/_inside_rtabmap_rgbd_odom.sh

  pseudo-gt:
    <<: *pseudo-gt
    profiles: ["offline"]
    command: bash

  pseudo-gt-cuda:
    <<: *pseudo-gt-cuda
    profiles: ["cuda"]
    command: bash

  test:
    <<: *pseudo-gt
    profiles: ["test"]
    command: bash -lc "python3 -m py_compile /work/scripts/*.py && pytest -q /work/tests && shellcheck -e SC1090 /work/scripts/*.sh /work/docker/*.sh"
